<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>

    <!-- Event category colors -->
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow-sky" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Animated rotation keyframes via CSS -->
    <style>
      @keyframes spin-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spin-ccw { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
      @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
      @keyframes dash-flow { to { stroke-dashoffset: -40; } }
      .gear-cw { animation: spin-cw 20s linear infinite; transform-origin: center; }
      .gear-ccw { animation: spin-ccw 14s linear infinite; transform-origin: center; }
      .gear-cw-slow { animation: spin-cw 30s linear infinite; transform-origin: center; }
      .pulse-node { animation: pulse 3s ease-in-out infinite; }
      .flow-line { animation: dash-flow 2s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#27272a" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- Radial glow background accents -->
  <circle cx="300" cy="260" r="200" fill="#38bdf8" opacity="0.04"/>
  <circle cx="540" cy="320" r="160" fill="#818cf8" opacity="0.04"/>
  <circle cx="400" cy="460" r="120" fill="#34d399" opacity="0.03"/>

  <!-- ===== CENTRAL LARGE GEAR (SKY - Symposia) ===== -->
  <g transform="translate(300, 260)" class="gear-cw">
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#sky)" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="url(#sky)" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="url(#sky)" stroke-width="2" opacity="0.6"/>
    <!-- 12 teeth -->
    <g stroke="url(#sky)" stroke-width="2.5" fill="none" opacity="0.8">
      <line x1="0" y1="-110" x2="0" y2="-128"/>
      <line x1="55" y1="-95" x2="64" y2="-111"/>
      <line x1="95" y1="-55" x2="111" y2="-64"/>
      <line x1="110" y1="0" x2="128" y2="0"/>
      <line x1="95" y1="55" x2="111" y2="64"/>
      <line x1="55" y1="95" x2="64" y2="111"/>
      <line x1="0" y1="110" x2="0" y2="128"/>
      <line x1="-55" y1="95" x2="-64" y2="111"/>
      <line x1="-95" y1="55" x2="-111" y2="64"/>
      <line x1="-110" y1="0" x2="-128" y2="0"/>
      <line x1="-95" y1="-55" x2="-111" y2="-64"/>
      <line x1="-55" y1="-95" x2="-64" y2="-111"/>
    </g>
    <!-- Spokes -->
    <g stroke="url(#sky)" stroke-width="1" opacity="0.25">
      <line x1="25" y1="0" x2="90" y2="0"/>
      <line x1="-25" y1="0" x2="-90" y2="0"/>
      <line x1="0" y1="25" x2="0" y2="90"/>
      <line x1="0" y1="-25" x2="0" y2="-90"/>
    </g>
  </g>
  <!-- Center dot -->
  <circle cx="300" cy="260" r="6" fill="#38bdf8" opacity="0.7" filter="url(#glow-soft)"/>

  <!-- ===== MEDIUM GEAR (INDIGO - HMDS) ===== -->
  <g transform="translate(480, 180)" class="gear-ccw">
    <circle cx="0" cy="0" r="72" fill="none" stroke="url(#indigo)" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="56" fill="none" stroke="url(#indigo)" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#indigo)" stroke-width="1.5" opacity="0.6"/>
    <!-- 10 teeth -->
    <g stroke="url(#indigo)" stroke-width="2" fill="none" opacity="0.8">
      <line x1="0" y1="-72" x2="0" y2="-86"/>
      <line x1="42" y1="-58" x2="50" y2="-70"/>
      <line x1="68" y1="-22" x2="82" y2="-27"/>
      <line x1="68" y1="22" x2="82" y2="27"/>
      <line x1="42" y1="58" x2="50" y2="70"/>
      <line x1="0" y1="72" x2="0" y2="86"/>
      <line x1="-42" y1="58" x2="-50" y2="70"/>
      <line x1="-68" y1="22" x2="-82" y2="27"/>
      <line x1="-68" y1="-22" x2="-82" y2="-27"/>
      <line x1="-42" y1="-58" x2="-50" y2="-70"/>
    </g>
  </g>
  <circle cx="480" cy="180" r="5" fill="#818cf8" opacity="0.7" filter="url(#glow-soft)"/>

  <!-- ===== SMALL GEAR (EMERALD - Summer School) ===== -->
  <g transform="translate(540, 340)" class="gear-cw">
    <circle cx="0" cy="0" r="54" fill="none" stroke="url(#emerald)" stroke-width="1.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#emerald)" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="url(#emerald)" stroke-width="1.5" opacity="0.6"/>
    <!-- 8 teeth -->
    <g stroke="url(#emerald)" stroke-width="2" fill="none" opacity="0.8">
      <line x1="0" y1="-54" x2="0" y2="-66"/>
      <line x1="38" y1="-38" x2="47" y2="-47"/>
      <line x1="54" y1="0" x2="66" y2="0"/>
      <line x1="38" y1="38" x2="47" y2="47"/>
      <line x1="0" y1="54" x2="0" y2="66"/>
      <line x1="-38" y1="38" x2="-47" y2="47"/>
      <line x1="-54" y1="0" x2="-66" y2="0"/>
      <line x1="-38" y1="-38" x2="-47" y2="-47"/>
    </g>
  </g>
  <circle cx="540" cy="340" r="4" fill="#34d399" opacity="0.7" filter="url(#glow-soft)"/>

  <!-- ===== TINY GEAR (CYAN - Winter School) ===== -->
  <g transform="translate(400, 440)" class="gear-ccw">
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#cyan)" stroke-width="1.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#cyan)" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="url(#cyan)" stroke-width="1.5" opacity="0.6"/>
    <!-- 8 teeth -->
    <g stroke="url(#cyan)" stroke-width="1.8" fill="none" opacity="0.8">
      <line x1="0" y1="-40" x2="0" y2="-50"/>
      <line x1="28" y1="-28" x2="35" y2="-35"/>
      <line x1="40" y1="0" x2="50" y2="0"/>
      <line x1="28" y1="28" x2="35" y2="35"/>
      <line x1="0" y1="40" x2="0" y2="50"/>
      <line x1="-28" y1="28" x2="-35" y2="35"/>
      <line x1="-40" y1="0" x2="-50" y2="0"/>
      <line x1="-28" y1="-28" x2="-35" y2="-35"/>
    </g>
  </g>
  <circle cx="400" cy="440" r="3" fill="#22d3ee" opacity="0.7" filter="url(#glow-soft)"/>

  <!-- ===== MICRO GEAR (AMBER - Meetings) ===== -->
  <g transform="translate(180, 380)" class="gear-cw-slow">
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#amber)" stroke-width="1.5" opacity="0.7"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="url(#amber)" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="url(#amber)" stroke-width="1.5" opacity="0.6"/>
    <!-- 6 teeth -->
    <g stroke="url(#amber)" stroke-width="1.5" fill="none" opacity="0.7">
      <line x1="0" y1="-32" x2="0" y2="-40"/>
      <line x1="28" y1="-16" x2="35" y2="-20"/>
      <line x1="28" y1="16" x2="35" y2="20"/>
      <line x1="0" y1="32" x2="0" y2="40"/>
      <line x1="-28" y1="16" x2="-35" y2="20"/>
      <line x1="-28" y1="-16" x2="-35" y2="-20"/>
    </g>
  </g>
  <circle cx="180" cy="380" r="3" fill="#fbbf24" opacity="0.6" filter="url(#glow-soft)"/>

  <!-- ===== LINKAGE CONNECTIONS (four-bar mechanism style) ===== -->
  <!-- Central gear to HMDS gear -->
  <line x1="388" y1="210" x2="420" y2="195" stroke="url(#sky)" stroke-width="1.5" opacity="0.4"/>
  <!-- Central gear to Emerald gear -->
  <line x1="395" y1="300" x2="498" y2="320" stroke="url(#emerald)" stroke-width="1.5" opacity="0.35"/>
  <!-- Central gear to Amber gear -->
  <line x1="210" y1="310" x2="195" y2="365" stroke="url(#amber)" stroke-width="1.2" opacity="0.3"/>
  <!-- Emerald to Cyan gear -->
  <line x1="510" y1="380" x2="435" y2="430" stroke="url(#cyan)" stroke-width="1.2" opacity="0.3"/>
  <!-- Central to Cyan gear -->
  <line x1="340" y1="368" x2="380" y2="410" stroke="url(#cyan)" stroke-width="1" opacity="0.25"/>

  <!-- ===== FLOWING DATA LINES ===== -->
  <!-- Horizontal flowing connectors -->
  <line x1="80" y1="260" x2="180" y2="260" stroke="#38bdf8" stroke-width="1" stroke-dasharray="8 6" opacity="0.3" class="flow-line"/>
  <line x1="620" y1="260" x2="740" y2="260" stroke="#818cf8" stroke-width="1" stroke-dasharray="8 6" opacity="0.25" class="flow-line"/>
  <line x1="600" y1="440" x2="720" y2="440" stroke="#34d399" stroke-width="1" stroke-dasharray="6 8" opacity="0.2" class="flow-line"/>

  <!-- ===== JOINT NODES (linkage pivots) ===== -->
  <circle cx="388" cy="210" r="4" fill="#38bdf8" opacity="0.5" class="pulse-node"/>
  <circle cx="395" cy="300" r="4" fill="#34d399" opacity="0.5" class="pulse-node"/>
  <circle cx="210" cy="310" r="3" fill="#fbbf24" opacity="0.4" class="pulse-node"/>
  <circle cx="510" cy="380" r="3" fill="#22d3ee" opacity="0.4" class="pulse-node"/>

  <!-- ===== DECORATIVE ORBITS ===== -->
  <ellipse cx="300" cy="260" rx="180" ry="180" fill="none" stroke="#38bdf8" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 8"/>
  <ellipse cx="480" cy="280" rx="220" ry="140" fill="none" stroke="#818cf8" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 10" transform="rotate(-12 480 280)"/>

  <!-- ===== LABELS ===== -->
  <text x="300" y="142" text-anchor="middle" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="10" letter-spacing="0.15em" opacity="0.6">SYMPOSIA</text>
  <text x="480" y="98" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="10" letter-spacing="0.15em" opacity="0.6">HMDS</text>
  <text x="620" y="326" text-anchor="start" fill="#34d399" font-family="system-ui, sans-serif" font-size="10" letter-spacing="0.15em" opacity="0.5">SUMMER SCHOOL</text>
  <text x="400" y="510" text-anchor="middle" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="10" letter-spacing="0.15em" opacity="0.5">WINTER SCHOOL</text>
  <text x="118" y="395" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="9" letter-spacing="0.12em" opacity="0.45">MEETINGS</text>

  <!-- ===== CORNER ACCENTS ===== -->
  <path d="M30 30 L30 60 M30 30 L60 30" stroke="#38bdf8" stroke-width="1" opacity="0.2"/>
  <path d="M770 30 L770 60 M770 30 L740 30" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <path d="M30 570 L30 540 M30 570 L60 570" stroke="#fbbf24" stroke-width="1" opacity="0.15"/>
  <path d="M770 570 L770 540 M770 570 L740 570" stroke="#34d399" stroke-width="1" opacity="0.15"/>
</svg>