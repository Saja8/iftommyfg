<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gear1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="gear2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="gear3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="link" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  
  <!-- Large gear (center-left) -->
  <g transform="translate(280, 280)" opacity="0.9">
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#gear1)" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#gear1)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#gear1)" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#38bdf8" opacity="0.6"/>
    <!-- Gear teeth -->
    <g stroke="url(#gear1)" stroke-width="2.5" fill="none">
      <line x1="0" y1="-120" x2="0" y2="-140"/>
      <line x1="60" y1="-104" x2="70" y2="-121"/>
      <line x1="104" y1="-60" x2="121" y2="-70"/>
      <line x1="120" y1="0" x2="140" y2="0"/>
      <line x1="104" y1="60" x2="121" y2="70"/>
      <line x1="60" y1="104" x2="70" y2="121"/>
      <line x1="0" y1="120" x2="0" y2="140"/>
      <line x1="-60" y1="104" x2="-70" y2="121"/>
      <line x1="-104" y1="60" x2="-121" y2="70"/>
      <line x1="-120" y1="0" x2="-140" y2="0"/>
      <line x1="-104" y1="-60" x2="-121" y2="-70"/>
      <line x1="-60" y1="-104" x2="-70" y2="-121"/>
    </g>
    <!-- Spokes -->
    <g stroke="url(#gear1)" stroke-width="1" opacity="0.4">
      <line x1="30" y1="0" x2="100" y2="0"/>
      <line x1="-30" y1="0" x2="-100" y2="0"/>
      <line x1="0" y1="30" x2="0" y2="100"/>
      <line x1="0" y1="-30" x2="0" y2="-100"/>
      <line x1="21" y1="21" x2="71" y2="71"/>
      <line x1="-21" y1="-21" x2="-71" y2="-71"/>
      <line x1="21" y1="-21" x2="71" y2="-71"/>
      <line x1="-21" y1="21" x2="-71" y2="71"/>
    </g>
  </g>
  
  <!-- Medium gear (upper-right, meshing) -->
  <g transform="translate(520, 180)" opacity="0.85">
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#gear2)" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="65" fill="none" stroke="url(#gear2)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#gear2)" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#818cf8" opacity="0.6"/>
    <!-- Gear teeth -->
    <g stroke="url(#gear2)" stroke-width="2.5" fill="none">
      <line x1="0" y1="-80" x2="0" y2="-96"/>
      <line x1="56.6" y1="-56.6" x2="67.9" y2="-67.9"/>
      <line x1="80" y1="0" x2="96" y2="0"/>
      <line x1="56.6" y1="56.6" x2="67.9" y2="67.9"/>
      <line x1="0" y1="80" x2="0" y2="96"/>
      <line x1="-56.6" y1="56.6" x2="-67.9" y2="67.9"/>
      <line x1="-80" y1="0" x2="-96" y2="0"/>
      <line x1="-56.6" y1="-56.6" x2="-67.9" y2="-67.9"/>
    </g>
    <!-- Spokes -->
    <g stroke="url(#gear2)" stroke-width="1" opacity="0.4">
      <line x1="22" y1="0" x2="65" y2="0"/>
      <line x1="-22" y1="0" x2="-65" y2="0"/>
      <line x1="0" y1="22" x2="0" y2="65"/>
      <line x1="0" y1="-22" x2="0" y2="-65"/>
    </g>
  </g>
  
  <!-- Small gear (lower-right) -->
  <g transform="translate(580, 400)" opacity="0.8">
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#gear3)" stroke-width="2"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="url(#gear3)" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="url(#gear3)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#34d399" opacity="0.6"/>
    <!-- Gear teeth -->
    <g stroke="url(#gear3)" stroke-width="2" fill="none">
      <line x1="0" y1="-55" x2="0" y2="-68"/>
      <line x1="47.6" y1="-27.5" x2="58.9" y2="-34"/>
      <line x1="47.6" y1="27.5" x2="58.9" y2="34"/>
      <line x1="0" y1="55" x2="0" y2="68"/>
      <line x1="-47.6" y1="27.5" x2="-58.9" y2="34"/>
      <line x1="-47.6" y1="-27.5" x2="-58.9" y2="-34"/>
    </g>
  </g>
  
  <!-- Four-bar linkage mechanism -->
  <g opacity="0.7">
    <!-- Links -->
    <line x1="120" y1="420" x2="220" y2="350" stroke="url(#link)" stroke-width="3" stroke-linecap="round"/>
    <line x1="220" y1="350" x2="340" y2="380" stroke="url(#link)" stroke-width="3" stroke-linecap="round"/>
    <line x1="340" y1="380" x2="320" y2="480" stroke="url(#link)" stroke-width="3" stroke-linecap="round"/>
    <line x1="120" y1="420" x2="320" y2="480" stroke="#475569" stroke-width="2" stroke-dasharray="6 4"/>
    <!-- Joints -->
    <circle cx="120" cy="420" r="6" fill="#f0abfc" opacity="0.8"/>
    <circle cx="220" cy="350" r="6" fill="#f0abfc" opacity="0.8"/>
    <circle cx="340" cy="380" r="6" fill="#f0abfc" opacity="0.8"/>
    <circle cx="320" cy="480" r="6" fill="#f0abfc" opacity="0.8"/>
    <!-- Ground symbol -->
    <line x1="105" y1="430" x2="135" y2="430" stroke="#64748b" stroke-width="1.5"/>
    <line x1="110" y1="435" x2="130" y2="435" stroke="#64748b" stroke-width="1"/>
    <line x1="305" y1="490" x2="335" y2="490" stroke="#64748b" stroke-width="1.5"/>
    <line x1="310" y1="495" x2="330" y2="495" stroke="#64748b" stroke-width="1"/>
  </g>
  
  <!-- Connecting lines between gears (transmission) -->
  <g stroke="#475569" stroke-width="1" stroke-dasharray="4 4" opacity="0.5">
    <line x1="400" y1="280" x2="440" y2="220"/>
    <line x1="520" y1="260" x2="560" y2="345"/>
  </g>
  
  <!-- Decorative dots -->
  <g fill="#38bdf8" opacity="0.15">
    <circle cx="680" cy="100" r="40"/>
    <circle cx="100" cy="150" r="25"/>
    <circle cx="700" cy="500" r="60"/>
    <circle cx="50" cy="550" r="20"/>
  </g>
  
  <!-- Small accent circles -->
  <circle cx="660" cy="300" r="3" fill="#34d399" opacity="0.6"/>
  <circle cx="690" cy="320" r="2" fill="#38bdf8" opacity="0.5"/>
  <circle cx="150" cy="200" r="2.5" fill="#818cf8" opacity="0.5"/>
  <circle cx="430" cy="500" r="2" fill="#f0abfc" opacity="0.5"/>
</svg>